name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: build · format · test · pack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Fourthwall.slnx

      - name: Format check
        run: dotnet format Fourthwall.slnx --verify-no-changes

      - name: Build (warnings as errors)
        run: dotnet build Fourthwall.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Fourthwall.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack Fourthwall.slnx -c Release --no-build -o artifacts
